<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balboa Panel Debug</title>
  <style>
    body{
      margin:0;
      padding:16px;
      font-family:Arial,sans-serif;
      background:#081a36;
      color:#fff;
    }
    .wrap{
      max-width:620px;
      margin:0 auto;
    }
    .card{
      background:#10264d;
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      padding:16px;
      margin-bottom:14px;
    }
    h1{
      font-size:26px;
      margin:0 0 14px;
      text-align:center;
    }
    button{
      width:100%;
      min-height:46px;
      border:none;
      border-radius:12px;
      font-size:16px;
      font-weight:700;
      color:#fff;
      background:#2d6cdf;
      margin-bottom:10px;
      cursor:pointer;
    }
    .mono{
      font-family:monospace;
      white-space:pre-wrap;
      word-break:break-word;
      font-size:14px;
      line-height:1.45;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Panel Debug</h1>

    <div class="card">
      <button onclick="loadPanel()">Načítať panel</button>
      <div class="mono" id="out">Pripravené.</div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://balboa-proxy-worker.lechstav.workers.dev";

    async function fetchJson(url) {
      const resp = await fetch(url, { method: "GET", cache: "no-store" });
      const text = await resp.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        data = { raw: text };
      }
      return { resp, data };
    }

    function hexToBytes(hex) {
      if (!hex) return [];
      const clean = String(hex).replace(/[^0-9a-f]/gi, "");
      if (clean.length % 2 !== 0) return [];
      const out = [];
      for (let i = 0; i < clean.length; i += 2) {
        out.push(parseInt(clean.substring(i, i + 2), 16));
      }
      return out;
    }

    async function loadPanel() {
      const out = document.getElementById("out");
      out.textContent = "Načítavam...";

      try {
        const { resp, data } = await fetchJson(WORKER_URL + "/panelupdate");

        if (!resp.ok) {
          out.textContent = "HTTP chyba: " + resp.status;
          return;
        }

        const hex = data.hex || "";
        const p = hexToBytes(hex);

        if (!p.length) {
          out.textContent = "Nepodarilo sa získať hex.";
          return;
        }

        let rows = [];
        rows.push("Dĺžka poľa: " + p.length);
        rows.push("");
        rows.push("Všetky byty:");
        for (let i = 0; i < p.length; i++) {
          const dec = p[i];
          const h = "0x" + dec.toString(16).padStart(2, "0");
          const celsiusHalf = (dec / 2).toFixed(1);
          rows.push(i.toString().padStart(2, "0") + ": dec " + dec.toString().padStart(3, " ") + " / " + h + " / ÷2=" + celsiusHalf);
        }

        rows.push("");
        rows.push("Raw hex:");
        rows.push(hex);

        out.textContent = rows.join("\n");
      } catch (e) {
        out.textContent = "Chyba: " + e.message;
      }
    }

    loadPanel();
  </script>
</body>
</html>
