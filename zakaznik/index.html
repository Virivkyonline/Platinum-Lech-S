<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platinum Lech Spa</title>
  <style>
    :root{
      --bg:#eaf7ff;
      --bg2:#dff2ff;
      --card:rgba(255,255,255,.82);
      --card2:rgba(255,255,255,.92);
      --text:#12344d;
      --muted:#5d7f97;
      --line:rgba(120,180,220,.28);
      --accent:#78c8f5;
      --accent2:#56b9ef;
      --shadow:0 10px 30px rgba(80,150,190,.12);
      --ok:#1fa971;
      --danger:#d95f5f;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      padding:16px;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left,#ffffff 0%,transparent 35%),
        linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
      min-height:100vh;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
    }

    .hero{
      text-align:center;
      padding:18px 10px 10px;
    }

    h1{
      margin:0;
      font-size:34px;
      color:#0d3550;
    }

    .sub{
      margin:8px 0 0;
      color:var(--muted);
      font-size:15px;
    }

    .card{
      background:var(--card);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border:1px solid var(--line);
      border-radius:24px;
      padding:18px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .title{
      font-size:20px;
      font-weight:700;
      margin:0 0 14px;
      color:#174666;
    }

    .statusbar{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .statusbox{
      background:var(--card2);
      border:1px solid #d5eefb;
      border-radius:18px;
      padding:16px;
      text-align:center;
    }

    .statuslabel{
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:.05em;
    }

    .statusvalue{
      font-size:24px;
      font-weight:700;
    }

    .worker-row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:10px 14px;
      border-radius:999px;
      background:#effaff;
      border:1px solid #d4eefc;
      color:#33627e;
      font-size:14px;
    }

    .badge.ok{
      color:var(--ok);
      font-weight:700;
    }

    button{
      width:100%;
      border:none;
      border-radius:18px;
      padding:18px 12px;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      color:#0f3854;
      background:linear-gradient(180deg,#d9f3ff 0%,#bfeaff 100%);
      box-shadow:0 6px 18px rgba(85,170,220,.16);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
    }

    button:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(85,170,220,.22);
      background:linear-gradient(180deg,#e6f8ff 0%,#cceeff 100%);
    }

    button:active{
      transform:translateY(0);
    }

    .primary{
      background:linear-gradient(180deg,#9edfff 0%,#7fd0fa 100%);
    }

    .danger{
      background:linear-gradient(180deg,#ffe0e0 0%,#ffcaca 100%);
      color:#7a2e2e;
    }

    .grid2,.grid3{
      display:grid;
      gap:12px;
    }

    .grid2{grid-template-columns:1fr 1fr}
    .grid3{grid-template-columns:1fr 1fr 1fr}

    .info{
      background:#f8fdff;
      border:1px solid #d8effc;
      border-radius:18px;
      padding:16px;
      min-height:70px;
      white-space:pre-wrap;
      word-break:break-word;
      font-size:16px;
      color:#184663;
    }

    .footer{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      padding:6px 0 18px;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:680px){
      h1{font-size:28px}
      .grid2,.grid3,.statusbar{grid-template-columns:1fr}
      button{font-size:17px;padding:17px 10px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Platinum Lech Spa</h1>
      <p class="sub">Jednoduché webové ovládanie vírivky</p>
    </div>

    <div class="card">
      <div class="title">Stav vírivky</div>

      <div class="statusbar">
        <div class="statusbox">
          <div class="statuslabel">Pripojenie</div>
          <div class="statusvalue" id="connectionState">Pripravené</div>
        </div>

    <div class="card">
      <div class="title">Čerpadlá</div>
      <div class="grid3">
        <button onclick="sendButton(4, 'Pumpa 1')">Pumpa 1</button>
        <button onclick="sendButton(5, 'Pumpa 2')">Pumpa 2</button>
        <button onclick="sendButton(6, 'Pumpa 3')">Pumpa 3</button>
      </div>
      <div class="grid3" style="margin-top:12px">
        <button onclick="sendButton(7, 'Pumpa 4')">Pumpa 4</button>
        <button onclick="sendButton(8, 'Pumpa 5')">Pumpa 5</button>
        <button onclick="sendButton(9, 'Pumpa 6')">Pumpa 6</button>
      </div>
    </div>

    <div class="card">
      <div class="title">Osvetlenie a príslušenstvo</div>
      <div class="grid3">
        <button onclick="sendButton(17, 'Svetlo 1')">Svetlo 1</button>
        <button onclick="sendButton(18, 'Svetlo 2')">Svetlo 2</button>
        <button onclick="sendButton(12, 'Blower')">Blower</button>
      </div>
      <div class="grid3" style="margin-top:12px">
        <button onclick="sendButton(14, 'Mister')">Mister</button>
        <button onclick="sendButton(22, 'Aux 1')">Aux 1</button>
        <button onclick="sendButton(23, 'Aux 2')">Aux 2</button>
      </div>
    </div>

    <div class="card">
      <div class="title">Nastavenia</div>
      <div class="grid2">
        <button onclick="sendButton(80, 'Rozsah teploty')">Rozsah teploty</button>
        <button onclick="sendButton(81, 'Režim kúrenia')">Režim kúrenia</button>
      </div>
    </div>

    <div class="card">
      <div class="title">Správa</div>
      <div class="info" id="messageBox">Vitajte. Ovládanie je pripravené.</div>
    </div>

    <div class="footer">Platinum Lech Spa · zákaznícka verzia</div>
  </div>

  <script>
    const WORKER_URL = "https://balboa-proxy-worker.lechstav.workers.dev";

    function setMessage(text) {
      document.getElementById("messageBox").textContent = text;
    }

    function setLastAction(text) {
      document.getElementById("lastAction").textContent = text;
    }

    function setConnection(text) {
      document.getElementById("connectionState").textContent = text;
    }

    function setWorkerBadge(text, ok = true) {
      const el = document.getElementById("workerBadge");
      el.textContent = text;
      el.className = ok ? "badge ok" : "badge";
    }

    async function fetchText(url) {
      const resp = await fetch(url, { method: "GET" });
      const text = await resp.text();
      return { resp, text };
    }

    async function fetchJson(url) {
      const { resp, text } = await fetchText(url);
      let data = null;
      try {
        data = JSON.parse(text);
      } catch (e) {
        data = { raw: text };
      }
      return { resp, data, raw: text };
    }

    async function testWorker() {
      try {
        setMessage("Prebieha test pripojenia...");
        const { resp, raw } = await fetchJson(WORKER_URL);
        if (resp.ok) {
          setConnection("Online");
          setWorkerBadge("● Worker online", true);
          setLastAction("Test pripojenia");
          setMessage("Pripojenie je v poriadku. Server odpovedal: " + (raw || "OK"));
        } else {
          setConnection("Chyba");
          setWorkerBadge("● Worker problém", false);
          setMessage("Test zlyhal. HTTP status: " + resp.status);
        }
      } catch (e) {
        setConnection("Offline");
        setWorkerBadge("● Worker nedostupný", false);
        setMessage("Nepodarilo sa pripojiť: " + e.message);
      }
    }

    async function loadPanelUpdate() {
      try {
        setMessage("Načítavam aktuálny stav vírivky...");
        const { resp, data } = await fetchJson(WORKER_URL + "/panelupdate");
        if (resp.ok) {
          setConnection("Online");
          setLastAction("Obnovený stav");
          const bytes = data.bytesLength ?? "-";
          setMessage("Stav vírivky bol úspešne načítaný. Počet prijatých bajtov: " + bytes);
        } else {
          setMessage("Načítanie stavu zlyhalo. HTTP status: " + resp.status);
        }
      } catch (e) {
        setMessage("Chyba pri načítaní stavu: " + e.message);
      }
    }

    async function sendButton(code, name) {
      try {
        setMessage("Odosielam príkaz: " + name + " ...");
        const { resp, data } = await fetchJson(WORKER_URL + "/button?code=" + encodeURIComponent(code));

        if (resp.ok) {
          setConnection("Online");
          setLastAction(name);
          const txt = (data && data.response) ? data.response : "";
          const ok = txt.includes("Command received") || txt.includes('status="0"');
          if (ok) {
            setMessage("Príkaz bol prijatý: " + name);
          } else {
            setMessage("Príkaz bol odoslaný: " + name);
          }
        } else {
          setMessage("Príkaz zlyhal: " + name + ". HTTP status: " + resp.status);
        }
      } catch (e) {
        setMessage("Chyba pri odoslaní príkazu " + name + ": " + e.message);
      }
    }
  </script>
</body>
</html>
