<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platinum Lech Spa</title>
  <style>
    :root{
      --bg:#eaf7ff;
      --bg2:#dff2ff;
      --card:rgba(255,255,255,.82);
      --card2:rgba(255,255,255,.92);
      --text:#12344d;
      --muted:#5d7f97;
      --line:rgba(120,180,220,.28);
      --shadow:0 10px 30px rgba(80,150,190,.12);
      --ok:#1fa971;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:14px;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left,#ffffff 0%,transparent 35%),
        linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
      min-height:100vh;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
    }

    .hero{
      text-align:center;
      padding:10px 8px 14px;
    }

    h1{
      margin:0;
      font-size:30px;
      color:#0d3550;
    }

    .sub{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .card{
      background:var(--card);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border:1px solid var(--line);
      border-radius:24px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:var(--shadow);
    }

    .title{
      font-size:18px;
      font-weight:700;
      margin:0 0 12px;
      color:#174666;
    }

    .statusbar{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .statusbox{
      background:var(--card2);
      border:1px solid #d5eefb;
      border-radius:18px;
      padding:14px;
      text-align:center;
    }

    .statuslabel{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.05em;
    }

    .statusvalue{
      font-size:20px;
      font-weight:700;
    }

    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:#effaff;
      border:1px solid #d4eefc;
      color:#33627e;
      font-size:13px;
    }

    .badge.ok{
      color:var(--ok);
      font-weight:700;
    }

    .grid2,.grid3{
      display:grid;
      gap:8px;
    }

    .grid2{
      grid-template-columns:1fr 1fr;
    }

    .grid3{
      grid-template-columns:1fr 1fr 1fr;
    }

    button{
      width:100%;
      border:none;
      border-radius:999px;
      padding:10px 8px;
      min-height:50px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      color:#0f3854;
      background:linear-gradient(180deg,#d9f3ff 0%,#bfeaff 100%);
      box-shadow:0 4px 12px rgba(85,170,220,.14);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
    }

    button:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 18px rgba(85,170,220,.20);
      background:linear-gradient(180deg,#e6f8ff 0%,#cceeff 100%);
    }

    button:active{
      transform:translateY(0);
    }

    .info{
      background:#f8fdff;
      border:1px solid #d8effc;
      border-radius:18px;
      padding:14px;
      min-height:70px;
      white-space:pre-wrap;
      word-break:break-word;
      font-size:15px;
      color:#184663;
    }

    .footer{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      padding:4px 0 16px;
    }

    @media (max-width:680px){
      h1{
        font-size:26px;
      }

      .grid2{
        grid-template-columns:1fr 1fr;
      }

      .grid3{
        grid-template-columns:1fr 1fr 1fr;
      }

      button{
        font-size:14px;
        padding:8px 6px;
        min-height:46px;
      }

      .statusvalue{
        font-size:18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Platinum Lech Spa</h1>
      <p class="sub">Jednoduché webové ovládanie vírivky</p>
    </div>

    <div class="card">
      <div class="title">Stav vírivky</div>

      <div class="statusbar">
        <div class="statusbox">
          <div class="statuslabel">Pripojenie</div>
          <div class="statusvalue" id="connectionState">Pripravené</div>
        </div>
      </div>

      <div class="badge-row">
        <div class="badge ok">● Zákaznícka verzia</div>
      </div>
    </div>

    <div class="card">
      <div class="title">Čerpadlá</div>
      <div class="grid3">
        <button onclick="sendButton(4, 'Pumpa 1')">Pumpa 1</button>
        <button onclick="sendButton(5, 'Pumpa 2')">Pumpa 2</button>
        <button onclick="sendButton(6, 'Pumpa 3')">Pumpa 3</button>
      </div>
      <div class="grid3" style="margin-top:8px;">
        <button onclick="sendButton(7, 'Pumpa 4')">Pumpa 4</button>
        <button onclick="sendButton(8, 'Pumpa 5')">Pumpa 5</button>
        <button onclick="sendButton(9, 'Pumpa 6')">Pumpa 6</button>
      </div>
    </div>

    <div class="card">
      <div class="title">Osvetlenie a príslušenstvo</div>
      <div class="grid3">
        <button onclick="sendButton(17, 'Svetlo 1')">Svetlo 1</button>
        <button onclick="sendButton(18, 'Svetlo 2')">Svetlo 2</button>
        <button onclick="sendButton(12, 'Blower')">Blower</button>
      </div>
      <div class="grid3" style="margin-top:8px;">
        <button onclick="sendButton(14, 'Mister')">Mister</button>
        <button onclick="sendButton(22, 'Aux 1')">Aux 1</button>
        <button onclick="sendButton(23, 'Aux 2')">Aux 2</button>
      </div>
    </div>

    <div class="card">
      <div class="title">Nastavenia</div>
      <div class="grid2">
        <button onclick="sendButton(80, 'Rozsah teploty')">Rozsah teploty</button>
        <button onclick="sendButton(81, 'Režim kúrenia')">Režim kúrenia</button>
      </div>
    </div>

    <div class="card">
      <div class="title">Správa</div>
      <div class="info" id="messageBox">Vitajte. Ovládanie je pripravené.</div>
    </div>

    <div class="footer">Platinum Lech Spa · zákaznícka verzia</div>
  </div>

  <script>
    const WORKER_URL = "https://balboa-proxy-worker.lechstav.workers.dev";

    function setMessage(text) {
      document.getElementById("messageBox").textContent = text;
    }

    function setConnection(text) {
      document.getElementById("connectionState").textContent = text;
    }

    async function fetchText(url) {
      const resp = await fetch(url, { method: "GET" });
      const text = await resp.text();
      return { resp, text };
    }

    async function fetchJson(url) {
      const { resp, text } = await fetchText(url);
      let data = null;
      try {
        data = JSON.parse(text);
      } catch (e) {
        data = { raw: text };
      }
      return { resp, data, raw: text };
    }

    async function sendButton(code, name) {
      try {
        setMessage("Odosielam príkaz: " + name + " ...");
        const { resp, data } = await fetchJson(WORKER_URL + "/button?code=" + encodeURIComponent(code));

        if (resp.ok) {
          setConnection("Online");
          const txt = (data && data.response) ? data.response : "";
          const ok = txt.includes("Command received") || txt.includes('status="0"');

          if (ok) {
            setMessage("Príkaz bol prijatý: " + name);
          } else {
            setMessage("Príkaz bol odoslaný: " + name);
          }
        } else {
          setMessage("Príkaz zlyhal: " + name + ". HTTP status: " + resp.status);
        }
      } catch (e) {
        setConnection("Offline");
        setMessage("Chyba pri odoslaní príkazu " + name + ": " + e.message);
      }
    }
  </script>
</body>
</html>
