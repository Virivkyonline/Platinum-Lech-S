<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ovládanie vírivky Balboa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin: 0 0 18px 0;
    }

    .card {
      background: #1b1b1f;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }

    label {
      display: block;
      font-size: 16px;
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      background: #2c2c31;
      color: #fff;
      border: 1px solid #666;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      margin-bottom: 14px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .row3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      background: #6f6f6f;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 15px 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #868686;
    }

    .out {
      background: #101014;
      border-radius: 10px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      min-height: 60px;
    }

    .mono {
      font-family: monospace;
    }

    .infoGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .smallBox {
      background: #101014;
      border-radius: 10px;
      padding: 12px;
    }

    .smallTitle {
      color: #bbb;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .smallValue {
      font-size: 16px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Ovládanie vírivky Balboa</h1>

  <div class="card">
    <label for="workerUrl">Adresa workeru</label>
    <input id="workerUrl" type="text" value="https://balboa-proxy-worker.lechstav.workers.dev">

    <div class="row2">
      <button onclick="testWorker()">Test workeru</button>
      <button onclick="clearAll()">Vymazať výstup</button>
    </div>

    <div class="row2">
      <button onclick="loadPanelUpdate()">Načítať stav vírivky</button>
      <button onclick="loadDeviceConfig()">Načítať konfiguráciu</button>
    </div>
  </div>

  <div class="card">
    <label>Tlačidlá z APK</label>

    <div class="row3">
      <button onclick="sendButton(4, 'Pump1')">Pumpa 1</button>
      <button onclick="sendButton(5, 'Pump2')">Pumpa 2</button>
      <button onclick="sendButton(6, 'Pump3')">Pumpa 3</button>
    </div>

    <div class="row3">
      <button onclick="sendButton(7, 'Pump4')">Pumpa 4</button>
      <button onclick="sendButton(8, 'Pump5')">Pumpa 5</button>
      <button onclick="sendButton(9, 'Pump6')">Pumpa 6</button>
    </div>

    <div class="row3">
      <button onclick="sendButton(12, 'Blower')">Blower</button>
      <button onclick="sendButton(14, 'Mister')">Mister</button>
      <button onclick="sendButton(17, 'Light1')">Svetlo 1</button>
    </div>

    <div class="row3">
      <button onclick="sendButton(18, 'Light2')">Svetlo 2</button>
      <button onclick="sendButton(22, 'Aux1')">Aux 1</button>
      <button onclick="sendButton(23, 'Aux2')">Aux 2</button>
    </div>

    <div class="row2">
      <button onclick="sendButton(80, 'TempRange')">Rozsah teploty</button>
      <button onclick="sendButton(81, 'HeatMode')">Režim kúrenia</button>
    </div>
  </div>

  <div class="card">
    <div class="infoGrid">
      <div class="smallBox">
        <div class="smallTitle">Súbor / akcia</div>
        <div class="smallValue" id="fileName">-</div>
      </div>
      <div class="smallBox">
        <div class="smallTitle">HTTP status</div>
        <div class="smallValue" id="httpStatus">-</div>
      </div>
      <div class="smallBox">
        <div class="smallTitle">Počet bajtov</div>
        <div class="smallValue" id="bytesLength">-</div>
      </div>
      <div class="smallBox">
        <div class="smallTitle">Device ID</div>
        <div class="smallValue mono" id="deviceId">-</div>
      </div>
    </div>
  </div>

  <div class="card">
    <label>HEX dáta</label>
    <div class="out mono" id="hexBox">-</div>
  </div>

  <div class="card">
    <label>Base64 dáta</label>
    <div class="out mono" id="base64Box">-</div>
  </div>

  <div class="card">
    <label>Odpoveď / XML</label>
    <div class="out mono" id="xmlBox">-</div>
  </div>

  <div class="card">
    <label>Krátky log</label>
    <div class="out mono" id="logBox">Pripravené.</div>
  </div>

  <script>
    function getWorkerUrl() {
      return document.getElementById("workerUrl").value.trim().replace(/\/+$/, "");
    }

    function log(msg) {
      const box = document.getElementById("logBox");
      const now = new Date().toLocaleTimeString();
      box.textContent = now + " " + msg + "\n\n" + box.textContent;
    }

    function clearAll() {
      document.getElementById("fileName").textContent = "-";
      document.getElementById("httpStatus").textContent = "-";
      document.getElementById("bytesLength").textContent = "-";
      document.getElementById("deviceId").textContent = "-";
      document.getElementById("hexBox").textContent = "-";
      document.getElementById("base64Box").textContent = "-";
      document.getElementById("xmlBox").textContent = "-";
      document.getElementById("logBox").textContent = "Vymazané.";
    }

    function fillResult(data) {
      document.getElementById("fileName").textContent = data.file || data.action || "-";
      document.getElementById("httpStatus").textContent = data.status ?? "-";
      document.getElementById("bytesLength").textContent = data.bytesLength ?? "-";
      document.getElementById("deviceId").textContent = data.deviceId || "-";
      document.getElementById("hexBox").textContent = data.hex || "-";
      document.getElementById("base64Box").textContent = data.base64 || "-";
      document.getElementById("xmlBox").textContent = data.xml || data.response || "-";
    }

    async function fetchJson(path) {
      const url = getWorkerUrl() + path;
      log("[INFO] Volám: " + url);

      const resp = await fetch(url, { method: "GET" });
      const text = await resp.text();

      log("[INFO] HTTP status: " + resp.status);

      let data;
      try {
        data = JSON.parse(text);
      } catch (e) {
        data = {
          file: path,
          status: resp.status,
          bytesLength: "-",
          deviceId: "-",
          hex: "-",
          base64: "-",
          xml: text
        };
      }

      return data;
    }

    async function testWorker() {
      try {
        const url = getWorkerUrl();
        log("[INFO] Test workeru: " + url);

        const resp = await fetch(url);
        const text = await resp.text();

        fillResult({
          file: "worker test",
          status: resp.status,
          bytesLength: text.length,
          deviceId: "-",
          hex: "-",
          base64: "-",
          xml: text
        });

        log("[OK] Worker odpovedal.");
      } catch (e) {
        log("[CHYBA] Worker test zlyhal: " + e.message);
      }
    }

    async function loadPanelUpdate() {
      try {
        const data = await fetchJson("/panelupdate");
        fillResult(data);
      } catch (e) {
        log("[CHYBA] Načítanie stavu zlyhalo: " + e.message);
      }
    }

    async function loadDeviceConfig() {
      try {
        const data = await fetchJson("/deviceconfig");
        fillResult(data);
      } catch (e) {
        log("[CHYBA] Načítanie konfigurácie zlyhalo: " + e.message);
      }
    }

    async function sendButton(code, name) {
      try {
        log("[INFO] Posielam " + name + " (code " + code + ")");
        const data = await fetchJson("/button?code=" + encodeURIComponent(code));
        fillResult(data);
      } catch (e) {
        log("[CHYBA] Tlačidlo " + name + " zlyhalo: " + e.message);
      }
    }
  </script>
</body>
</html>
