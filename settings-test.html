<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nastavenia vírivky</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 20% 15%, rgba(80,140,255,.18), transparent 20%),
        radial-gradient(circle at 80% 25%, rgba(80,140,255,.14), transparent 18%),
        radial-gradient(circle at 35% 70%, rgba(80,140,255,.12), transparent 24%),
        linear-gradient(180deg, #041b3e 0%, #06224b 45%, #041833 100%);
      min-height: 100vh;
      padding: 16px 0 24px;
    }

    .wrap {
      width: calc(100% - 28px);
      max-width: 430px;
      margin: 0 auto;
    }

    .panel {
      border-radius: 28px;
      padding: 24px 16px;
      background: linear-gradient(180deg, rgba(5,34,79,.94) 0%, rgba(2,20,50,.96) 100%);
      border: 2px solid rgba(0,0,0,.38);
      box-shadow:
        inset 0 0 0 1px rgba(140,190,255,.08),
        0 8px 30px rgba(0,0,0,.25);
    }

    h1 {
      margin: 0 0 20px;
      text-align: center;
      font-size: 28px;
      font-weight: 400;
      color: #f3f8ff;
    }

    .block {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(170,210,255,.18);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .label {
      font-size: 18px;
      color: #f3f8ff;
      margin-bottom: 10px;
    }

    .value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .subvalue {
      font-size: 18px;
      color: #cde5ff;
      margin-top: 8px;
    }

    .small {
      font-size: 13px;
      color: #cde5ff;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .minmax {
      width: 52px;
      text-align: center;
      color: #cde5ff;
      font-size: 15px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #79d8ff;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button, input[type="number"] {
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid rgba(170,210,255,.28);
      border-radius: 14px;
      color: #eef7ff;
      background: linear-gradient(180deg, rgba(173,213,255,.20), rgba(96,149,224,.18));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
      font-size: 17px;
      font-weight: 700;
    }

    input[type="number"]::placeholder {
      color: rgba(255,255,255,.7);
    }

    button {
      cursor: pointer;
    }

    button.active {
      background: linear-gradient(180deg, rgba(120,255,185,.38), rgba(55,175,115,.28));
      box-shadow:
        inset 0 0 16px rgba(120,255,185,.42),
        0 0 18px rgba(60,220,145,.20);
      border-color: rgba(120,255,185,.55);
      color: #ffffff;
    }

    .msg {
      margin-top: 14px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(170,210,255,.12);
      color: #e8f3ff;
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 14px;
      min-height: 48px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Nastavenia</h1>

      <div class="block">
        <div class="label">Nastavená teplota</div>
        <div class="value" id="tempValue">--.-°C</div>
        <div class="row">
          <div class="minmax" id="tempMinLabel">10</div>
          <input type="range" id="tempSlider" min="10" max="26.5" step="0.5" value="10">
          <div class="minmax" id="tempMaxLabel">26.5</div>
        </div>
        <div class="subvalue" id="tempRangeText">Nízky rozsah</div>
        <div style="margin-top:12px;">
          <button onclick="saveSetTemp()">Uložiť teplotu</button>
        </div>
      </div>

      <div class="block">
        <div class="label">Jednotky teploty</div>
        <div class="grid2">
          <button id="btnUnitC" onclick="setTempUnits('C')">°C</button>
          <button id="btnUnitF" onclick="setTempUnits('F')">°F</button>
        </div>
      </div>

      <div class="block">
        <div class="label">Teplotný režim</div>
        <div class="grid2">
          <button id="btnHeatReady" onclick="setHeatMode('ready')">Pripravený</button>
          <button id="btnHeatRest" onclick="setHeatMode('rest')">Spiaci</button>
        </div>
      </div>

      <div class="block">
        <div class="label">Teplotný rozsah</div>
        <div class="grid2">
          <button id="btnRangeLow" onclick="setTempRange('low')">Nízky</button>
          <button id="btnRangeHigh" onclick="setTempRange('high')">Vysoký</button>
        </div>
      </div>

      <div class="block">
        <div class="label">Čas panelu</div>
        <div class="grid2">
          <input id="timeHour" type="number" min="0" max="23" placeholder="Hodina">
          <input id="timeMinute" type="number" min="0" max="59" placeholder="Minúta">
        </div>
        <div style="margin-top:10px;">
          <button onclick="saveSystemTime()">Uložiť čas</button>
        </div>
      </div>

      <div class="block">
        <div class="label">Filtračný cyklus 1</div>
        <div class="grid2">
          <input id="f1Hour" type="number" min="0" max="23" placeholder="Štart hodina">
          <input id="f1Minute" type="number" min="0" max="59" placeholder="Štart minúta">
        </div>
        <div class="grid2" style="margin-top:10px;">
          <input id="f1DurHour" type="number" min="0" max="23" placeholder="Trvanie hodiny">
          <input id="f1DurMinute" type="number" min="0" max="59" placeholder="Trvanie minúty">
        </div>
        <div class="subvalue" id="f1Ends" style="margin-top:10px;">Koniec: --:--</div>
      </div>

      <div class="block">
        <div class="label">Filtračný cyklus 2</div>
        <div class="grid2">
          <button id="btnF2Off" onclick="setFilter2Enabled(false)">Vypnutý</button>
          <button id="btnF2On" onclick="setFilter2Enabled(true)">Zapnutý</button>
        </div>
        <div class="grid2" style="margin-top:10px;">
          <input id="f2Hour" type="number" min="0" max="23" placeholder="Štart hodina">
          <input id="f2Minute" type="number" min="0" max="59" placeholder="Štart minúta">
        </div>
        <div class="grid2" style="margin-top:10px;">
          <input id="f2DurHour" type="number" min="0" max="23" placeholder="Trvanie hodiny">
          <input id="f2DurMinute" type="number" min="0" max="59" placeholder="Trvanie minúty">
        </div>
        <div class="subvalue" id="f2Ends" style="margin-top:10px;">Koniec: --:--</div>
        <div style="margin-top:10px;">
          <button onclick="saveFilters()">Uložiť filtračné cykly</button>
        </div>
      </div>

      <div class="block">
        <div class="label">Filtre</div>
        <div class="grid2">
          <button onclick="loadFilters()">Načítať filtre</button>
          <button onclick="debugPanel()">Debug panel</button>
        </div>
        <div class="small" id="filtersInfo" style="margin-top:10px;">Zatiaľ nenačítané.</div>
      </div>

      <div class="block">
        <div class="label">Obnovenie</div>
        <div class="grid2">
          <button onclick="refreshPanel()">Načítať z panelu</button>
          <button onclick="refreshPanel()">Obnoviť stav</button>
        </div>
      </div>

      <div class="msg" id="msg">Pripravené.</div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://balboa-proxy-worker.lechstav.workers.dev";

    const state = {
      unit: "C",
      tempRangeHigh: false,
      heatMode: "Pripravený",
      setTemp: 10.0,
      filter2Enabled: false
    };

    function setMsg(text) {
      document.getElementById("msg").textContent = text;
    }

    async function fetchJson(url) {
      const resp = await fetch(url, { method: "GET", cache: "no-store" });
      const text = await resp.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        data = { raw: text };
      }
      return { resp, data, text };
    }

    function hexToBytes(hex) {
      if (!hex) return [];
      const clean = String(hex).replace(/[^0-9a-f]/gi, "");
      if (clean.length % 2 !== 0) return [];
      const out = [];
      for (let i = 0; i < clean.length; i += 2) {
        out.push(parseInt(clean.substring(i, i + 2), 16));
      }
      return out;
    }

    function pad2(n) {
      return String(Number(n) || 0).padStart(2, "0");
    }

    function parsePanel(hex) {
      const p = hexToBytes(hex);
      if (p.length < 25) return null;

      const rawSetTemp = p[24] ?? 0;
      const hour = p[7] ?? 0;
      const minute = p[8] ?? 0;
      const flags = p[14] ?? 0;

      const tempRangeHigh = (flags & 0x04) !== 0;

      const heatModeIsRest = (flags & 0x10) !== 0;
      const heatModeRaw = p[9] ?? 0;

      let heatMode = "Pripravený";
      if (heatModeIsRest || heatModeRaw === 1) {
        heatMode = "Spiaci";
      }

      const setTemp = state.unit === "C" ? rawSetTemp / 2 : rawSetTemp;

      return {
        setTemp,
        heatMode,
        tempRangeHigh,
        tempRange: tempRangeHigh ? "Vysoký rozsah" : "Nízky rozsah",
        time: pad2(hour) + ":" + pad2(minute),
        rawBytes: p
      };
    }

    function updateSliderLimits() {
      const slider = document.getElementById("tempSlider");
      const minLabel = document.getElementById("tempMinLabel");
      const maxLabel = document.getElementById("tempMaxLabel");

      if (state.unit === "C") {
        if (state.tempRangeHigh) {
          slider.min = "26.5";
          slider.max = "40";
          slider.step = "0.5";
          minLabel.textContent = "26.5";
          maxLabel.textContent = "40";
        } else {
          slider.min = "10";
          slider.max = "26.5";
          slider.step = "0.5";
          minLabel.textContent = "10";
          maxLabel.textContent = "26.5";
        }
      } else {
        if (state.tempRangeHigh) {
          slider.min = "80";
          slider.max = "104";
          slider.step = "1";
          minLabel.textContent = "80";
          maxLabel.textContent = "104";
        } else {
          slider.min = "50";
          slider.max = "80";
          slider.step = "1";
          minLabel.textContent = "50";
          maxLabel.textContent = "80";
        }
      }

      const min = Number(slider.min);
      const max = Number(slider.max);

      if (state.setTemp < min) state.setTemp = min;
      if (state.setTemp > max) state.setTemp = max;

      slider.value = String(state.setTemp);
    }

    function addMinutes(h, m, dh, dm) {
      let total = (Number(h) * 60) + Number(m) + (Number(dh) * 60) + Number(dm);
      total = ((total % 1440) + 1440) % 1440;
      return {
        h: Math.floor(total / 60),
        m: total % 60
      };
    }

    function updateFilterEnds() {
      const f1 = addMinutes(
        Number(document.getElementById("f1Hour").value || 0),
        Number(document.getElementById("f1Minute").value || 0),
        Number(document.getElementById("f1DurHour").value || 0),
        Number(document.getElementById("f1DurMinute").value || 0)
      );
      document.getElementById("f1Ends").textContent = "Koniec: " + pad2(f1.h) + ":" + pad2(f1.m);

      const f2 = addMinutes(
        Number(document.getElementById("f2Hour").value || 0),
        Number(document.getElementById("f2Minute").value || 0),
        Number(document.getElementById("f2DurHour").value || 0),
        Number(document.getElementById("f2DurMinute").value || 0)
      );
      document.getElementById("f2Ends").textContent = "Koniec: " + pad2(f2.h) + ":" + pad2(f2.m);
    }

    function render() {
      updateSliderLimits();

      const decimals = state.unit === "C" ? 1 : 0;
      document.getElementById("tempValue").textContent =
        Number(state.setTemp).toFixed(decimals) + "°" + state.unit;

      document.getElementById("tempRangeText").textContent =
        state.tempRangeHigh ? "Vysoký rozsah" : "Nízky rozsah";

      document.getElementById("btnUnitC").classList.toggle("active", state.unit === "C");
      document.getElementById("btnUnitF").classList.toggle("active", state.unit === "F");

      const isReady = state.heatMode === "Pripravený";
      document.getElementById("btnHeatReady").classList.toggle("active", isReady);
      document.getElementById("btnHeatRest").classList.toggle("active", !isReady);

      document.getElementById("btnRangeLow").classList.toggle("active", !state.tempRangeHigh);
      document.getElementById("btnRangeHigh").classList.toggle("active", state.tempRangeHigh);

      document.getElementById("btnF2Off").classList.toggle("active", !state.filter2Enabled);
      document.getElementById("btnF2On").classList.toggle("active", state.filter2Enabled);

      updateFilterEnds();
    }

    async function refreshPanel() {
      try {
        setMsg("Načítavam stav z panelu...");
        const { resp, data } = await fetchJson(WORKER_URL + "/panelupdate");

        if (!resp.ok) {
          setMsg("Načítanie stavu zlyhalo. HTTP status: " + resp.status);
          return;
        }

        const parsed = parsePanel(data.hex || "");
        if (!parsed) {
          setMsg("PanelUpdate sa nepodarilo rozpoznať.");
          return;
        }

        state.heatMode = parsed.heatMode;
        state.tempRangeHigh = parsed.tempRangeHigh;
        state.setTemp = parsed.setTemp;

        document.getElementById("timeHour").value = Number(parsed.time.split(":")[0]);
        document.getElementById("timeMinute").value = Number(parsed.time.split(":")[1]);

        render();
        setMsg(
          "Stav načítaný.\n" +
          "Režim: " + parsed.heatMode + "\n" +
          "Rozsah: " + (parsed.tempRangeHigh ? "Vysoký" : "Nízky") + "\n" +
          "Čas panelu: " + parsed.time
        );
      } catch (e) {
        setMsg("Chyba pri načítaní panelu: " + e.message);
      }
    }

    function convertSetTempForWorker(temp, unit) {
      if (unit === "C") return String((Number(temp) * 2).toFixed(1));
      return String(Number(temp).toFixed(1));
    }

    async function saveSetTemp() {
      try {
        const uiValue = Number(document.getElementById("tempSlider").value);
        const workerValue = convertSetTempForWorker(uiValue, state.unit);

        setMsg("Nastavujem teplotu...");
        const { resp, data } = await fetchJson(
          WORKER_URL + "/settemp?value=" + encodeURIComponent(workerValue)
        );

        if (!resp.ok) {
          setMsg("Nastavenie teploty zlyhalo. HTTP status: " + resp.status);
          return;
        }

        const txt = data.response || "";
        const ok = txt.includes("Command received") || txt.includes('status="0"');

        state.setTemp = uiValue;
        render();

        setMsg((ok ? "Teplota nastavená." : "Príkaz odoslaný.") + " Čakám na server...");
        setTimeout(refreshPanel, 2500);
        setTimeout(refreshPanel, 6000);
      } catch (e) {
        setMsg("Chyba pri nastavení teploty: " + e.message);
      }
    }

    async function setTempUnits(unit) {
      try {
        setMsg("Prepínam jednotky...");
        const { resp, data } = await fetchJson(
          WORKER_URL + "/tempunits?value=" + encodeURIComponent(unit)
        );

        if (!resp.ok) {
          setMsg("Prepnutie jednotiek zlyhalo. HTTP status: " + resp.status);
          return;
        }

        state.unit = unit;
        render();

        const txt = data.response || "";
        const ok = txt.includes("Command received") || txt.includes('status="0"');

        setMsg((ok ? "Jednotky zmenené." : "Príkaz odoslaný.") + " Aktualizujem stav...");
        setTimeout(refreshPanel, 1500);
      } catch (e) {
        setMsg("Chyba pri prepnutí jednotiek: " + e.message);
      }
    }

    async function sendToggleButton(code, successText, errorText, delay = 1500) {
      const { resp, data } = await fetchJson(
        WORKER_URL + "/button?code=" + encodeURIComponent(code)
      );

      if (!resp.ok) {
        setMsg(errorText + " HTTP status: " + resp.status);
        return false;
      }

      const txt = data.response || "";
      const ok = txt.includes("Command received") || txt.includes('status="0"');

      setMsg((ok ? successText : "Príkaz odoslaný.") + " Aktualizujem stav...");
      setTimeout(refreshPanel, delay);
      return true;
    }

    async function setHeatMode(target) {
      try {
        const currentlyReady = state.heatMode === "Pripravený";
        const wantReady = target === "ready";

        if ((wantReady && currentlyReady) || (!wantReady && !currentlyReady)) {
          setMsg("Teplotný režim je už nastavený.");
          return;
        }

        setMsg("Prepínam teplotný režim...");
        await sendToggleButton(81, "Teplotný režim prepnutý.", "Prepnutie teplotného režimu zlyhalo.", 2500);
      } catch (e) {
        setMsg("Chyba pri prepínaní teplotného režimu: " + e.message);
      }
    }

    async function setTempRange(target) {
      try {
        const wantHigh = target === "high";

        if ((wantHigh && state.tempRangeHigh) || (!wantHigh && !state.tempRangeHigh)) {
          setMsg("Teplotný rozsah je už nastavený.");
          return;
        }

        setMsg("Prepínam teplotný rozsah...");
        await sendToggleButton(80, "Teplotný rozsah prepnutý.", "Prepnutie teplotného rozsahu zlyhalo.", 2000);
      } catch (e) {
        setMsg("Chyba pri prepínaní teplotného rozsahu: " + e.message);
      }
    }

    async function saveSystemTime() {
      try {
        const hh = Number(document.getElementById("timeHour").value);
        const mm = Number(document.getElementById("timeMinute").value);

        if (!Number.isInteger(hh) || hh < 0 || hh > 23 || !Number.isInteger(mm) || mm < 0 || mm > 59) {
          setMsg("Zadaj platný čas.");
          return;
        }

        setMsg("Ukladám čas panelu...");
        const { resp, data } = await fetchJson(
          WORKER_URL + "/systemtime?hh=" + encodeURIComponent(hh) + "&mm=" + encodeURIComponent(mm)
        );

        if (!resp.ok) {
          setMsg("Uloženie času zlyhalo. HTTP status: " + resp.status);
          return;
        }

        const txt = data.response || "";
        const ok = txt.includes("Command received") || txt.includes('status="0"');

        setMsg((ok ? "Čas uložený." : "Príkaz odoslaný.") + " Aktualizujem stav...");
        setTimeout(refreshPanel, 2000);
      } catch (e) {
        setMsg("Chyba pri ukladaní času: " + e.message);
      }
    }

    function setFilter2Enabled(enabled) {
      state.filter2Enabled = !!enabled;
      render();
    }

    async function loadFilters() {
      try {
        setMsg("Načítavam filtre...");
        const { resp, data } = await fetchJson(WORKER_URL + "/getfilters");

        if (!resp.ok) {
          setMsg("Načítanie filtrov zlyhalo. HTTP status: " + resp.status);
          return;
        }

        const p = data.parsed;
        if (!p) {
          setMsg("Filtre sa nepodarilo rozpoznať.");
          return;
        }

        document.getElementById("f1Hour").value = p.filterCycle1.startsAtHour;
        document.getElementById("f1Minute").value = p.filterCycle1.startsAtMinute;
        document.getElementById("f1DurHour").value = p.filterCycle1.durationHour;
        document.getElementById("f1DurMinute").value = p.filterCycle1.durationMinute;

        state.filter2Enabled = !!p.filterCycle2.enabled;
        document.getElementById("f2Hour").value = p.filterCycle2.startsAtHour;
        document.getElementById("f2Minute").value = p.filterCycle2.startsAtMinute;
        document.getElementById("f2DurHour").value = p.filterCycle2.durationHour;
        document.getElementById("f2DurMinute").value = p.filterCycle2.durationMinute;

        document.getElementById("filtersInfo").textContent =
          "Cyklus 1: " + pad2(p.filterCycle1.startsAtHour) + ":" + pad2(p.filterCycle1.startsAtMinute) +
          ", trvanie " + p.filterCycle1.durationHour + "h " + p.filterCycle1.durationMinute + "m\n" +
          "Cyklus 2: " + (p.filterCycle2.enabled ? "Zapnutý" : "Vypnutý") + ", " +
          pad2(p.filterCycle2.startsAtHour) + ":" + pad2(p.filterCycle2.startsAtMinute) +
          ", trvanie " + p.filterCycle2.durationHour + "h " + p.filterCycle2.durationMinute + "m";

        render();
        setMsg("Filtre načítané.");
      } catch (e) {
        setMsg("Chyba pri načítaní filtrov: " + e.message);
      }
    }

    async function saveFilters() {
      try {
        const f1h = Number(document.getElementById("f1Hour").value);
        const f1m = Number(document.getElementById("f1Minute").value);
        const f1dh = Number(document.getElementById("f1DurHour").value);
        const f1dm = Number(document.getElementById("f1DurMinute").value);

        const f2h = Number(document.getElementById("f2Hour").value);
        const f2m = Number(document.getElementById("f2Minute").value);
        const f2dh = Number(document.getElementById("f2DurHour").value);
        const f2dm = Number(document.getElementById("f2DurMinute").value);

        const allValid =
          Number.isInteger(f1h) && f1h >= 0 && f1h <= 23 &&
          Number.isInteger(f1m) && f1m >= 0 && f1m <= 59 &&
          Number.isInteger(f1dh) && f1dh >= 0 && f1dh <= 23 &&
          Number.isInteger(f1dm) && f1dm >= 0 && f1dm <= 59 &&
          Number.isInteger(f2h) && f2h >= 0 && f2h <= 23 &&
          Number.isInteger(f2m) && f2m >= 0 && f2m <= 59 &&
          Number.isInteger(f2dh) && f2dh >= 0 && f2dh <= 23 &&
          Number.isInteger(f2dm) && f2dm >= 0 && f2dm <= 59;

        if (!allValid) {
          setMsg("Skontroluj hodnoty filtračných cyklov.");
          return;
        }

        setMsg("Ukladám filtračné cykly...");

        const params = new URLSearchParams({
          f1h: String(f1h),
          f1m: String(f1m),
          f1dh: String(f1dh),
          f1dm: String(f1dm),
          f2en: state.filter2Enabled ? "1" : "0",
          f2h: String(f2h),
          f2m: String(f2m),
          f2dh: String(f2dh),
          f2dm: String(f2dm)
        });

        const { resp, data } = await fetchJson(WORKER_URL + "/filters?" + params.toString());

        if (!resp.ok) {
          setMsg("Uloženie filtrov zlyhalo. HTTP status: " + resp.status);
          return;
        }

        const txt = data.response || "";
        const ok = txt.includes("Command received") || txt.includes('status="0"');

        setMsg((ok ? "Filtračné cykly uložené." : "Príkaz odoslaný.") + " Čakám na server...");
        setTimeout(loadFilters, 2500);
        setTimeout(loadFilters, 6000);
      } catch (e) {
        setMsg("Chyba pri ukladaní filtrov: " + e.message);
      }
    }

    async function debugPanel() {
      try {
        const { resp, data } = await fetchJson(WORKER_URL + "/panelupdate");
        if (!resp.ok) {
          setMsg("Debug panelu zlyhal. HTTP status: " + resp.status);
          return;
        }

        const parsed = parsePanel(data.hex || "");
        const bytes = parsed?.rawBytes || [];
        const preview = bytes.map((v, i) => `${String(i).padStart(2,"0")}:${v}`).join("  ");

        document.getElementById("filtersInfo").textContent =
          "HEX: " + (data.hex || "") + "\n\nBYTES:\n" + preview;

        setMsg("Debug panelu načítaný.");
      } catch (e) {
        setMsg("Chyba pri debug panelu: " + e.message);
      }
    }

    document.getElementById("tempSlider").addEventListener("input", function () {
      state.setTemp = Number(this.value);
      render();
    });

    ["f1Hour","f1Minute","f1DurHour","f1DurMinute","f2Hour","f2Minute","f2DurHour","f2DurMinute"]
      .forEach(id => {
        document.getElementById(id).addEventListener("input", updateFilterEnds);
      });

    render();
    refreshPanel();
    loadFilters();
  </script>
</body>
</html>
